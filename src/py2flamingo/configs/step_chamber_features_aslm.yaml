# STEP), but two things need the actual rig before this is trusted:
#   1. step_to_stage_transform.offset_mm below — auto-generated; it must be
#      CALIBRATED so the cavity centre maps to the ASLM focal-plane stage coords
#      (tip-test), exactly as configs/step_chamber_features.yaml was for the
#      current scope. As generated, cavity centre -> stage_z ~= 41 mm, almost
#      certainly wrong until measured.
#   2. Single-sided illumination side (see illumination_port_* below).
# The detection objective renders on the RIGHT via the ASLM ORIENTATION block
# (stage Z -> horizontal), NOT by moving the port here — the port stays on the
# chamber's detection face; the orientation rotates the whole scene.

