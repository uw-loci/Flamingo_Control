# 3D Visualization Configuration
# This file defines all parameters for the 3D sample chamber visualization
# avoiding hardcoded values in the implementation

display:
  # Display resolution (what the user sees in napari)
  voxel_size_um: [50, 50, 50]  # micrometers per display voxel (larger = fewer voxels = better performance)

  # Rendering settings
  fps_target: 30
  downsample_factor: 4  # Downsample live camera feed by this factor
  max_channels: 8
  rendering_backend: "napari"  # future: could be "vispy", "vtk"

  # Visual appearance
  chamber_wireframe_thickness: 2  # voxels
  objective_indicator_size: 20  # pixels
  rotation_axes_length: 30  # voxels

storage:
  # High-resolution storage (2-3x display resolution)
  # This preserves data quality during rotations
  voxel_size_um: [5, 5, 5]  # micrometers per storage voxel (3x finer than display)

  # Storage backend settings
  backend: "sparse"  # "sparse", "zarr", "hdf5"
  compression: "zstd"  # "none", "gzip", "zstd", "lz4"
  compression_level: 3

  # Memory management
  max_memory_mb: 2000
  cache_size_mb: 500
  use_memory_mapping: true

  # Chunking for efficient access
  chunk_size_voxels: [64, 64, 32]

sample_chamber:
  # Chamber dimensions and positioning
  # The chamber is positioned relative to the Y minimum stage position (anchor point)

  # Stage Y minimum position (anchor point in mm)
  y_min_anchor_mm: 5.0

  # Chamber extends below the anchor point (in mm)
  chamber_below_anchor_mm: 10.0  # 1cm below Y minimum

  # Chamber extends above the anchor point (in mm)
  chamber_above_anchor_mm: 4.0  # 4mm above Y minimum
  # Total chamber height = 10mm + 4mm = 14mm (matches original wireframe)

  # Chamber dimensions based on stage travel ranges
  # X: 1.0mm to 12.31mm = 11.31mm width
  chamber_width_x_mm: 11.31  # X dimension (horizontal, left-right)
  chamber_x_offset_mm: 1.0   # X minimum position

  # Z: 12.5mm to 26mm = 13.5mm depth
  chamber_depth_z_mm: 13.5   # Z dimension (depth, toward objective)
  chamber_z_offset_mm: 12.5  # Z minimum position

  # Sample-holder HARDWARE dimensions. These are required (no fallback
  # defaults in code) because a wrong value here could let an oversized
  # holder collide with the chamber wall undetected, or misposition the
  # 3D rendering of the assembly. Set them to the actual installed parts:
  #
  #   holder_diameter_mm    — diameter of the thick metal stem
  #   fep_tube_diameter_mm  — diameter of the FEP tube ("fine extension")
  #   fep_tube_length_mm    — length of the FEP tube below the metal stem;
  #                           sample tip sits at the bottom of this segment.
  #
  # Assembly geometry from sample tip up to chamber top:
  #   - sample tip is at the focus-frame Y (current stage Y)
  #   - FEP tube extends UP from tip by fep_tube_length_mm
  #   - metal stem extends UP from FEP top to the chamber top (clipped)
  holder_diameter_mm: 1.0
  fep_tube_diameter_mm: 0.25
  fep_tube_length_mm: 10.0

  # Visualization wall thickness (just for display, not physical)
  wall_thickness_mm: 1.0

  # Material properties
  material: "glass"
  refractive_index: 1.52

  # Sample region (where high-res data is stored)
  # Different radii for different axes based on physical constraints
  # X and Z are constrained by chamber, Y needs extra range for vertical movement
  sample_region_radius_um: 8000  # Default radius for backward compatibility
  # Asymmetric storage bounds (half-widths from center):
  sample_region_half_width_x_um: 6000   # ±6mm in X (chamber is ~11mm wide)
  sample_region_half_width_y_um: 12000  # ±12mm in Y (sample can go above chamber)
  sample_region_half_width_z_um: 7000   # ±7mm in Z (chamber is ~13.5mm deep)
  # Sample region center = focal plane in stage mm — the physical anchor
  # that every data-import path centers on (load session, load stitched,
  # tile capture, TIFF without metadata, etc). The STEP→stage transform is
  # calibrated so the cavity geometric center maps to this same stage point
  # (we assume focal plane = cavity center until measured otherwise), so
  # every dataset acquired against the tip-test reference (6.655, 7.0,
  # 19.25 mm) lands at the cavity center automatically.
  sample_region_center_um: [6655, 7000, 19250]

stage_control:
  # Visualization chamber ranges (in mm) - defines what we display in napari
  # These should be CENTERED on the objective focal plane, not the full stage range
  # The chamber is a fixed container; we visualize the region around the objective
  x_range_mm: [1.0, 12.31]    # X axis: left-right (full stage range, objective is centered)
  y_range_mm: [0.0, 14.0]     # Y axis: physical chamber bounds (stitched data outside this renders as separate napari layers)
  z_range_mm: [12.5, 26.0]    # Z axis: depth (toward objective)

  # Stage position limits (may differ from chamber bounds)
  y_stage_min_mm: 5.0         # Minimum stage position (collision prevention)
  y_stage_max_mm: 25.0        # Maximum stage position (can leave chamber)

  # Default positions (mm) - starting position for visualization
  x_default_mm: 6.655         # Center of X range
  y_default_mm: 5.0           # At minimum (1/3 down from chamber top)
  z_default_mm: 19.25         # Center of Z range

  # Axis inversion defaults (user preferences for stage control)
  # Set these based on your microscope's stage configuration
  # X is inverted: low stage X values (e.g., X=4) are on the RIGHT side of the chamber
  invert_x_default: true      # If true, X axis is mirrored (low X on right, high X on left)
  invert_z_default: false     # If true, moving slider right moves stage backward

  # Y-axis rotation configuration
  rotation_angle_offset_deg: 0.0    # Physical stage angle for "0 degrees" reference
  rotation_range_deg: [-180, 180]   # Allowed rotation range
  rotation_default_deg: 0.0         # Starting rotation angle

jog:
  # Keyboard / panel stage jogging (the "Stage Jog Panel" window).
  # While that window is open: W/A/S/D jog XY, Q/E jog Z. The panel also has
  # clickable jog buttons and adjustable per-axis movement amounts.
  xy_amount_mm: 0.05          # default XY step per key press / button click
  z_amount_mm: 0.02           # default Z step
  r_amount_deg: 5.0           # default rotation step (panel buttons only)
  adjust_percent: 20          # the up/down arrows scale an amount by this percentage
  amount_min_mm: 0.001        # smallest settable XY/Z amount
  amount_max_mm: 5.0          # largest settable XY/Z amount
  r_amount_min_deg: 0.1       # smallest settable rotation amount
  r_amount_max_deg: 90.0      # largest settable rotation amount
  # Per-axis manual sign override, applied on top of display alignment.
  # Flip one of these if a key/button moves the sample the wrong way at the bench.
  invert_x: false
  invert_y: false
  invert_z: false

coordinate_mapping:
  # Napari origin definition (internal pixel coordinate system)
  napari_origin: "back_upper_left"  # (0,0,0) position in napari viewer

  # Axis mapping to napari display
  # Napari axes: Axis 0 (yellow), Axis 1 (magenta), Axis 2 (cyan)
  napari_axis_mapping:
    z: 0  # Z maps to napari Axis 0 (yellow) - depth slices
    y: 1  # Y maps to napari Axis 1 (magenta) - vertical
    x: 2  # X maps to napari Axis 2 (cyan) - horizontal

  # Axis inversions for user-friendly display
  invert_y_display: true  # Y increases "up" for user (internally inverted)

  # Slider colors matching napari axes (for GUI)
  axis_colors:
    x: "#00FFFF"  # Cyan (napari Axis 2)
    y: "#FF00FF"  # Magenta (napari Axis 1)
    z: "#FFD700"  # Gold/Yellow (napari Axis 0)

channels:
  # Laser line channel configurations
  # These represent fluorescent signals excited by different laser wavelengths
  # Channel 0 (405nm) also accepts LED/brightfield data for testing
  # Contrast limits define default display range (0-500 for typical fluorescence/brightfield)
  - id: 0
    name: "405nm (DAPI)"
    default_colormap: "blue"
    default_visible: true
    update_strategy: "maximum"  # Maximum intensity projection for fluorescence
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 500

  - id: 1
    name: "488nm (GFP)"
    default_colormap: "green"
    default_visible: true
    update_strategy: "maximum"
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 500

  - id: 2
    name: "561nm (RFP)"
    default_colormap: "red"
    default_visible: true
    update_strategy: "maximum"
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 500

  - id: 3
    name: "640nm (Far-Red)"
    default_colormap: "magenta"
    default_visible: true  # Changed from false - users expect to see active laser data
    update_strategy: "maximum"
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 500

  # Right-side illumination channels (same lasers, opposite light path)
  - id: 4
    name: "405nm (DAPI) R"
    default_colormap: "blue"
    default_visible: false
    update_strategy: "maximum"
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 500

  - id: 5
    name: "488nm (GFP) R"
    default_colormap: "green"
    default_visible: false
    update_strategy: "maximum"
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 500

  - id: 6
    name: "561nm (RFP) R"
    default_colormap: "red"
    default_visible: false
    update_strategy: "maximum"
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 500

  - id: 7
    name: "640nm (Far-Red) R"
    default_colormap: "magenta"
    default_visible: false
    update_strategy: "maximum"
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 500

  # Dedicated LED / brightfield channel — separate from fluorescence
  # so it keeps its own contrast controls and doesn't overwrite the
  # 405nm channel when "Populate from Live" is used in LED mode.
  - id: 8
    name: "LED / Brightfield"
    default_colormap: "gray"
    default_visible: true
    update_strategy: "maximum"
    blend_mode: "additive"
    opacity: 0.8
    default_contrast_min: 0
    default_contrast_max: 4000

# Live view display settings
live_display:
  # Default contrast limits for live camera feed
  default_contrast_min: 0
  default_contrast_max: 65535
  # Auto-scale by default
  auto_scale: true

rotation:
  # Rotation handling parameters
  interpolation_method: "linear"  # "nearest", "linear", "cubic"

  # Anti-aliasing during rotation
  enable_antialiasing: true
  antialias_kernel_size: 3

  # Rotation limits (degrees)
  limits:
    rx: [-180, 180]
    ry: [-180, 180]
    rz: [0, 360]  # Full rotation around Z

  # Default rotation center (can be calibrated)
  rotation_center_um: [5000, 5000, 21500]

coordinate_system:
  # Define coordinate system conventions
  axes_orientation: "right_handed"  # or "left_handed"

  # Axis definitions relative to microscope
  x_axis: "stage_left_right"
  y_axis: "stage_front_back"
  z_axis: "vertical_up"

  # Origin location
  origin: "chamber_bottom_center"

performance:
  # Performance optimization settings
  enable_gpu_acceleration: false  # Future: CUDA/OpenCL acceleration

  # Level of detail (LOD) for zooming
  enable_lod: true
  lod_levels: 3
  lod_distance_thresholds: [100, 500, 1000]  # voxels

  # Update throttling
  min_update_interval_ms: 33  # ~30 FPS max
  batch_update_size: 1000  # Max voxels per update batch

  # Background processing
  use_threading: true
  num_worker_threads: 2

data_persistence:
  # Auto-save settings
  enable_autosave: false
  autosave_interval_minutes: 10
  autosave_directory: "~/flamingo_3d_sessions"

  # Session management
  max_session_history: 10
  compress_saved_sessions: true

  # Export formats
  supported_export_formats: ["tiff", "hdf5", "zarr", "npy"]
  default_export_format: "tiff"

# XY Focus Frame - shows current live view position in 3D
focus_frame:
  # Camera field of view (estimated from pixel_to_micron ~0.65 and 2048x2048 sensor)
  field_of_view_x_mm: 0.52  # ~520 micrometers horizontal FOV
  field_of_view_y_mm: 0.52  # ~520 micrometers vertical FOV (in stage Y direction)

  # Frame appearance
  color: "#FFFF00"  # Bright yellow (same as fine extension)
  edge_width: 1
  opacity: 0.9

  # Calibration preset name
  calibration_preset_name: "Tip of sample mount"

# STEP-based chamber overlay (now the DEFAULT 3D chamber view)
# The features YAML is extracted from the CAD STEP file by
# scripts/extract_step_chamber.py. When the YAML exists, the rectangular
# travel-envelope wireframe is NOT created at all — STEP geometry is the
# chamber view. The rectangular wireframe only appears as a fallback if the
# STEP features YAML is missing (e.g. fresh checkout before extraction).
# The "solid metal bulk" sub-layer is hidden by default since it occludes
# the sample.
step_chamber:
  enabled: true
  features_yaml: "configs/step_chamber_features.yaml"
  hide_rect_wireframe_when_on: true
  collision:
    enabled: false        # safety-gate hook — wire in Phase 2
    margin_mm: 0.25

# Future multicamera support placeholder
multicamera:
  enabled: false  # Set to true when implementing X-SPIM support
  max_cameras: 2
  view_fusion_method: "weighted_average"  # "maximum", "deconvolution"
  registration_method: "fiducial"  # "fiducial", "correlation", "manual"

# Sample-holder impact safety gate
# Before a move or rotation is dispatched, the 3D viewer projects the loaded
# data's bounding box to its post-move pose and warns if any corner would reach
# the chamber wall (within margin_mm). A QMessageBox lets the user proceed or
# abort. Applies uniformly to live tile data, stitched data, session restores,
# and any other source that populates the voxel_storage display cache.
safety:
  enabled: true              # master switch — set false to disable all safety popups
  margin_mm: 0.5             # treat data within this distance of any wall as "would impact"
  warn_on_rotation: true     # include R-only changes in the check (pure rotation swings)