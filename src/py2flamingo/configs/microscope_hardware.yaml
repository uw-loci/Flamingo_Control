# Microscope Hardware Configuration
# Single source of truth for camera, optics, and stage parameters.
# All code that needs sensor dimensions, pixel sizes, or FOV should
# read from this file rather than using local hardcoded constants.
#
# --- IMPORTANT ---
# If you change cameras or objectives, update this file and restart.
# All derived values (effective_pixel_size_um, fov_mm) are computed
# from these base parameters at load time.

camera:
  # Physical sensor pixel size (manufacturer spec, independent of optics)
  sensor_pixel_size_um: 6.5

  # Sensor dimensions in pixels (active area)
  sensor_width_px: 2048
  sensor_height_px: 2048

optics:
  # --- FALLBACK ONLY: auto-synced from the microscope on connect ---
  # The objective and tube lens change per objective/project, and the scope
  # reports them in ScopeSettings.txt (downloaded on connect). At runtime,
  # get_hardware_config() OVERLAYS the scope-reported values (and a measured
  # pixel_calibration.json, if present) on top of these. So you normally do
  # NOT need to hand-edit the three values below — they are only used when
  # running disconnected/offline with no ScopeSettings.txt available.
  #
  # NOTE: ScopeSettings.txt reports the SYSTEM magnification in its
  # "Objective lens magnification" field with the tube lens against a 200 mm
  # reference. So for these fallback values, set objective_magnification to the
  # system magnification the scope reports and keep tube == reference (200) to
  # avoid double-counting the tube-lens factor.
  #
  # n7 currently: scope reports 5.0x with tube=200 -> effective pixel
  # = 6.5 / 5.0 = 1.30 um (validated against real stitching data).
  objective_magnification: 6.3254

  # Tube lens design focal length in mm. Keep equal to reference_tube_lens_mm
  # (200) unless a project genuinely changes the tube lens AND the scope reports
  # the bare objective magnification (n7 reports system mag, so leave at 200).
  tube_lens_focal_length_mm: 200.0

  # Reference tube lens focal length (mm): system_mag = objective_mag *
  # (tube_lens / reference_tube_lens). Usually 200mm.
  reference_tube_lens_mm: 200.0

  # Numerical aperture of the detection objective.
  # Used for deconvolution PSF generation and depth-of-field calculations.
  numerical_aperture: 0.4

  # Refractive index of the immersion medium.
  # Common values: 1.0 (air), 1.33 (water), 1.52 (oil)
  immersion_refractive_index: 1.33

  # Camera X axis is inverted relative to stage X axis.
  # Common in light-sheet systems where the camera sees a mirror image.
  # If True, tile data is flipped in X before stitching.
  camera_x_inverted: true

# Laser / illumination channels
# Channel wavelengths used as defaults for per-channel deconvolution.
# The first matching channel wavelength is used if no explicit override.
channel_wavelengths_nm:
  0: 405.0    # DAPI
  1: 488.0    # GFP
  2: 561.0    # RFP
  3: 640.0    # Far-Red

# Stage travel limits (mm and degrees)
# These are safety limits — positions outside these ranges are rejected.
# Set conservatively to prevent hardware collisions.
stage_limits:
  x_min_mm: 0.0
  x_max_mm: 26.0
  y_min_mm: 0.0
  y_max_mm: 26.0
  z_min_mm: 0.0
  z_max_mm: 26.0
  r_min_deg: -720.0
  r_max_deg: 720.0
