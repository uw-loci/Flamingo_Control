# STEP chamber features YAML — generated by extract_step_chamber.py
# Hand-editable. Re-run the extractor to regenerate after a STEP update.
# Fields prefixed with _ are notes; the runtime ignores them.

source_step_file: "/home/msnelson/LSControl/OtherDocuments/25x-Chamber-for-ASLM (basic windows) (2).STEP"
units: mm
frame: step
axis_mapping_doc: "file_x = real-world LEFT-RIGHT (illumination axis); file_y = real-world FRONT-BACK (optical axis: +Y front, -Y back); file_z = real-world UP (vertical)"
step_to_stage_transform:
  # Detection objective (file_Y=-218.39 BACK end) maps to stage_z=12.5,
  # which is where the existing yellow Objective ring sits in the
  # rectangular wireframe — i.e., the napari "back" side. Sample-entry
  # port (file_Y=-167.02 FRONT end) maps to stage_z>26, off the
  # rectangular volume to the front. Edit signs/offsets if a different
  # orientation makes more sense after seeing the result.
  axis_permutation:
    stage_x: file_x
    stage_y: file_z
    stage_z: file_y
  sign:
    stage_x: 1
    stage_y: 1
    stage_z: 1
  offset_mm:
    stage_x: -127.475
    stage_y: -674.02
    stage_z: 230.89
features:
  -
    role: chamber_outer_box
    type: aabb
    # Chamber body only (~31.7 x 43.0 x 44.0 mm). Derived from the actual
    # axis-aligned outer-face PLANE entities in the STEP file, EXCLUDING:
    #   - the detection-objective lens sleeve protruding out of the back
    #     face (extends y from -210.04 down to -227.65 — that's the sleeve,
    #     not the chamber body),
    #   - the octagonal mounting base plate below the chamber body
    #     (z from 628.82 up to 656.50 — that's the plate, not the chamber),
    #   - the L/R mounting tabs / flanges at x=97.28 and x=174.98 (those are
    #     external features, not the chamber walls). The actual chamber body
    #     width (between the two illumination-objective mount faces) is
    #     ~31.7 mm — matches the user's eyeball measurement.
    bounds_step:
      x:
        - 118.28
        - 149.98
      y:
        - -210.04
        - -167.02
      z:
        - 656.50
        - 700.50
    layer_name: "STEP Chamber Bulk"
    visible_default: false
    napari_kind: surface
    color: "#888888"
    opacity: 0.25
  -
    role: chamber_cavity
    type: aabb
    # Inner cavity — verified against the user's physical measurements:
    #   width  (excitation-to-excitation, X):  19.35 mm  ✓ (~19.3 mm measured)
    #   depth  (front-to-back, Y):             26.70 mm  ✓ (26.7 mm measured)
    #   height (vertical, Z):                  44.00 mm  ✓ (44 mm measured)
    # Derived from the actual inner-face PLANE entities in the STEP file:
    #   x = [124.45, 143.80]: inner faces of the two illumination glass
    #       windows, which protrude ~2 mm into the cavity beyond the side
    #       walls. The wall-to-wall air gap is wider (23.5 mm, x=122.38..145.88).
    #   y = [-201.30, -174.60]: inner faces of the back (detection) and
    #       front (sample-entry) walls.
    #   z = [656.50, 700.50]: chamber body bottom (above the base plate)
    #       up through the open top.
    bounds_step:
      x:
        - 124.45
        - 143.80
      y:
        - -201.30
        - -174.60
      z:
        - 656.50
        - 700.50
    _note: "subtractive volume; defines air gap. Not rendered as a solid."
