  # ────────────────────────────────────────────────────────────────────
  -
    role: sample_entry_top_hole
    type: cylinder
    # axis along file +Z (real-world VERTICAL if the chamber is mounted with
    # file +Z pointing up). If your chamber's top-hole axis is different,
    # change this and center_step accordingly.
    axis:
      - 0
      - 0
      - 1
    # Initial guess: centered horizontally over the chamber body at the top.
    center_step:
      - 136.13
      - -189.94
      - 700.5
